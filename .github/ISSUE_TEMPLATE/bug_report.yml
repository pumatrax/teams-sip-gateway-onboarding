name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not include live credentials, real MAC addresses, full tokens, phone numbers, or tenant information."
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 15.x, Bash 3.2"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Tested device identity
      placeholder: "Yealink T57W, 96.86.x.x, 80:5e:XX:XX:dc:69"
    validations:
      required: true
  - type: dropdown
    id: stage
    attributes:
      label: Stage
      options:
        - Script startup
        - Stage 1 download
        - Stage 2 download
        - Stage 1 import
        - Stage 2 import or reboot
        - TAC verification
        - Browser sign-in
        - Stage 3 polling
        - Final config import
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Sanitized command
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized output
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, real MACs, full tokens, phone numbers, and tenant details.
          required: true
