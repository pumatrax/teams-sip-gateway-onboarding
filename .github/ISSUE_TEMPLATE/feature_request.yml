name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: "Keep examples sanitized. This project has only been tested with Yealink devices."
  - type: textarea
    id: problem
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: testing
    attributes:
      label: Validation plan
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and privacy impact
    validations:
      required: true
